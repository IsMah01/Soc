input {
  beats {
    port => 5044
    type => "beats"
  }
  tcp {
    port => 5000
    type => "syslog"
  }
  udp {
    port => 5000
    type => "syslog"
  }
  http {
    port => 8080
    type => "http"
  }
}

filter {
  mutate {
    add_field => { "[@metadata][index_date]" => "%{+YYYY.MM.dd}" }
  }

  if [type] == "syslog" {

    # Check if it's a FortiGate log
    if [message] =~ /devname=/ {

      # Parse all key=value pairs automatically
      kv {
        source => "message"
        field_split => " "
        value_split => "="
        target => "fortigate"
        trim_value => "\""
      }

      # Promote important fields to top level
      mutate {
        add_field => {
          "src_ip"      => "%{[fortigate][srcip]}"
          "dst_ip"      => "%{[fortigate][dstip]}"
          "src_port"    => "%{[fortigate][srcport]}"
          "dst_port"    => "%{[fortigate][dstport]}"
          "action"      => "%{[fortigate][action]}"
          "service"     => "%{[fortigate][service]}"
          "policy"      => "%{[fortigate][policyname]}"
          "log_type"    => "%{[fortigate][type]}"
          "log_subtype" => "%{[fortigate][subtype]}"
          "device"      => "%{[fortigate][devname]}"
          "duration"    => "%{[fortigate][duration]}"
          "sent_bytes"  => "%{[fortigate][sentbyte]}"
          "rcvd_bytes"  => "%{[fortigate][rcvdbyte]}"
        }
        add_tag => [ "fortigate" ]
      }

      # Convert ports and bytes to integers
      mutate {
        convert => {
          "src_port"   => "integer"
          "dst_port"   => "integer"
          "duration"   => "integer"
          "sent_bytes" => "integer"
          "rcvd_bytes" => "integer"
        }
      }

      # GeoIP on source IP
      if [src_ip] and [src_ip] != "%{[fortigate][srcip]}" {
        geoip {
          source => "src_ip"
          target => "src_geo"
        }
      }

    } else {
      # Generic syslog
      grok {
        match => { "message" => "%{SYSLOGLINE}" }
        tag_on_failure => ["_syslog_parse_failure"]
      }
    }
  }

  if [type] == "beats" {
    if [message] =~ /^\{/ {
      json {
        source => "message"
      }
    }
  }

  # Security tagging
  if [action] == "deny" or [action] == "block" {
    mutate { add_tag => [ "blocked" ] }
  }
  if [dst_port] == 22 or [service] == "SSH" {
    mutate { add_tag => [ "ssh" ] }
  }
  if [message] =~ /(?i)(failed|failure|denied|unauthorized)/ {
    mutate { add_tag => [ "security" ] }
  }

  mutate {
    remove_field => [ "[@version]" ]
  }
}

output {
  if "fortigate" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      user => "elastic"
      password => "${ELASTICSEARCH_PASSWORD}"
      index => "fortigate-logs-%{[@metadata][index_date]}"
    }
  } else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      user => "elastic"
      password => "${ELASTICSEARCH_PASSWORD}"
      index => "logstash-beats-%{[@metadata][index_date]}"
    }
  }
  stdout {
    codec => rubydebug
  }
}